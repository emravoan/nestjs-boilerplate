services:
  app:
    build: .
    container_name: nestjs_boilerplate_app
    ports:
      - '3000:3000'
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: nestjs_boilerplate
      DB_USERNAME: app
      DB_PASSWORD: app
    depends_on:
      - mysql
    volumes:
      - ./logs:/usr/src/app/logs

  mysql:
    image: mysql:8.4
    container_name: nestjs_boilerplate_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nestjs_boilerplate
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
